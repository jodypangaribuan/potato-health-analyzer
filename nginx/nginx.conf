events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Enable Gzip compression
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    upstream frontend {
        server potato-health-frontend:22444;
    }

    upstream backend {
        server potato-health-backend:22555;
    }

    server {
        listen 80;
        server_name potatohealth.my.id www.potatohealth.my.id localhost;

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Cache static assets from Next.js
            location /_next/static {
                proxy_pass http://frontend;
                expires 365d;
                add_header Cache-Control "public, max-age=31536000, immutable";
            }
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Increase body size for image uploads
            client_max_body_size 50M;
        }

        # Backend Media Files
        location /media/ {
            proxy_pass http://backend/media/;
            proxy_set_header Host $host;
            
            # Cache media files (images)
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        # Backend Docs (Swagger UI)
        location /docs {
            proxy_pass http://backend/docs;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend/openapi.json;
            proxy_set_header Host $host;
        }
    }
}
