services:
  backend:
    build: ./backend
    container_name: potato-health-backend
    ports:
      - "22555:22555"
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
    environment:
      - OPENBLAS_NUM_THREADS=1
    restart: always

  frontend:
    build: ./frontend
    container_name: potato-health-frontend
    # Expose internal port only, or mapped to a different host port if needed.
    # We remove 80:22444 because Nginx will take port 80.
    # We can leave it internal-only for Nginx to access.
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:latest
    container_name: potato-health-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    restart: always
